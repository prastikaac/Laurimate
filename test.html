<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laurimate Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0f2f5;
      --surface:    #ffffff;
      --border:     #e4e6ea;
      --text:       #1c1e21;
      --muted:      #65676b;
      --bubble-ai:  #ffffff;
      --bubble-you: #0084ff;
      --bubble-you-text: #ffffff;
      --header-bg:  #ffffff;
      --input-bg:   #f0f2f5;
      --radius-bubble: 18px;
      --online:     #31a24c;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── shell ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 680px;
      margin: 0 auto;
      background: var(--surface);
      box-shadow: 0 0 0 1px var(--border);
    }

    /* ── header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0084ff, #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--online);
      border: 2px solid var(--surface);
    }

    .header-info { flex: 1; }
    .header-name { font-size: 0.95rem; font-weight: 600; }
    .header-status { font-size: 0.75rem; color: var(--online); margin-top: 1px; }

    .header-url {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-url input {
      font-size: 0.72rem;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--muted);
      width: 220px;
      font-family: inherit;
      outline: none;
    }

    .header-url input:focus { border-color: #0084ff; }

    /* ── messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    /* date divider */
    .divider {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      margin: 10px 0 6px;
      font-weight: 500;
    }

    /* row */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }

    .msg-row.you { flex-direction: row-reverse; }

    /* small avatar in chat */
    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0084ff, #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg-row.you .msg-avatar { display: none; }

    /* bubble */
    .bubble {
      max-width: 72%;
      padding: 9px 13px;
      font-size: 0.9rem;
      line-height: 1.45;
      word-break: break-word;
    }

    /* AI bubbles */
    .msg-row.ai .bubble {
      background: var(--bubble-ai);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-bubble) var(--radius-bubble) var(--radius-bubble) 4px;
    }

    /* You bubbles */
    .msg-row.you .bubble {
      background: var(--bubble-you);
      color: var(--bubble-you-text);
      border-radius: var(--radius-bubble) var(--radius-bubble) 4px var(--radius-bubble);
    }

    /* tail merging — consecutive bubbles from same sender */
    .msg-row.ai.tail .bubble  { border-radius: 4px var(--radius-bubble) var(--radius-bubble) 4px; }
    .msg-row.you.tail .bubble { border-radius: var(--radius-bubble) 4px 4px var(--radius-bubble); }
    .msg-row.ai.tail  { margin-top: 2px; }
    .msg-row.you.tail { margin-top: 2px; }
    .msg-row.ai.tail .msg-avatar  { visibility: hidden; }

    /* timestamp */
    .ts {
      font-size: 0.68rem;
      color: var(--muted);
      margin: 2px 4px 6px;
      align-self: flex-end;
    }
    .msg-row.you .ts { text-align: right; }

    /* typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 13px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #b0b3b8;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-5px); }
    }

    /* ── input area ── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 14px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      background: var(--input-bg);
      border-radius: 22px;
      display: flex;
      align-items: flex-end;
      padding: 8px 14px;
      border: 1px solid transparent;
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within { border-color: #0084ff; }

    textarea#input {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      max-height: 120px;
      line-height: 1.4;
      overflow-y: auto;
    }

    textarea#input::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #0084ff;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover  { background: #006fe6; }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { background: #b0b3b8; cursor: not-allowed; }

    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* quick suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 16px 10px;
    }

    .sug {
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 16px;
      border: 1px solid #0084ff;
      color: #0084ff;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }

    .sug:hover { background: #0084ff; color: #fff; }

    /* scrollbar */
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
<div class="shell">

  <!-- header -->
  <div class="header">
    <div class="avatar">🎓</div>
    <div class="header-info">
      <div class="header-name">Laurimate</div>
      <div class="header-status">Active now</div>
    </div>
    <div class="header-url">
      <input type="text" id="apiUrl" value="https://chatwithgemini-wfqmz3bdja-uc.a.run.app" placeholder="Firebase URL" />
    </div>
  </div>

  <!-- messages -->
  <div class="messages" id="messages">
    <div class="divider">Today</div>
  </div>

  <!-- quick suggestions -->
  <div class="suggestions" id="suggestions">
    <button class="sug" onclick="quickSend('WiFi password')">WiFi password</button>
    <button class="sug" onclick="quickSend('Library hours')">Library hours</button>
    <button class="sug" onclick="quickSend('Whats for lunch')">Lunch menu</button>
    <button class="sug" onclick="quickSend('Where is the toilet')">Toilets</button>
    <button class="sug" onclick="quickSend('How do I print')">Printing</button>
    <button class="sug" onclick="quickSend('Parking info')">Parking</button>
  </div>

  <!-- input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Message Laurimate..."></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  var FIREBASE_URL = document.getElementById('apiUrl').value;
  var lastSender = null;
  var sending = false;
  var typingRow = null;

  document.getElementById('apiUrl').addEventListener('change', function() {
    FIREBASE_URL = this.value.trim();
  });

  // Auto-resize textarea
  var ta = document.getElementById('input');
  ta.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function now() {
    var d = new Date();
    var h = d.getHours(), m = d.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
  }

  function scrollBottom() {
    var el = document.getElementById('messages');
    el.scrollTop = el.scrollHeight;
  }

  function addMessage(text, sender) {
    var messages = document.getElementById('messages');
    var isTail = lastSender === sender;

    var row = document.createElement('div');
    row.className = 'msg-row ' + sender + (isTail ? ' tail' : '');

    if (sender === 'ai') {
      var av = document.createElement('div');
      av.className = 'msg-avatar';
      av.textContent = '🎓';
      row.appendChild(av);
    }

    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);

    messages.appendChild(row);

    // timestamp on last bubble only — update previous ts
    var prevTs = messages.querySelector('.ts:last-of-type');
    if (prevTs && lastSender === sender) prevTs.remove();

    var ts = document.createElement('div');
    ts.className = 'ts';
    ts.textContent = now();
    messages.appendChild(ts);

    lastSender = sender;
    scrollBottom();
    return row;
  }

  function showTyping() {
    var messages = document.getElementById('messages');
    typingRow = document.createElement('div');
    typingRow.className = 'msg-row ai';

    var av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = '🎓';
    typingRow.appendChild(av);

    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    typingRow.appendChild(bubble);

    messages.appendChild(typingRow);
    scrollBottom();
  }

  function hideTyping() {
    if (typingRow) {
      typingRow.remove();
      typingRow = null;
    }
  }

  function quickSend(text) {
    document.getElementById('input').value = text;
    sendMessage();
  }

  function sendMessage() {
    if (sending) return;
    var input = document.getElementById('input');
    var text = input.value.trim();
    if (!text) return;

    // hide suggestions after first message
    document.getElementById('suggestions').style.display = 'none';

    input.value = '';
    input.style.height = 'auto';

    addMessage(text, 'you');

    sending = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    fetch(FIREBASE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      hideTyping();
      var reply = data.reply || 'Sorry, I did not get a response.';
      addMessage(reply, 'ai');
      sending = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('input').focus();
    })
    .catch(function(err) {
      hideTyping();
      addMessage('Sorry, I could not reach the server. Please try again.', 'ai');
      console.error(err);
      sending = false;
      document.getElementById('sendBtn').disabled = false;
    });
  }

  // Welcome message on load
  window.addEventListener('load', function() {
    setTimeout(function() {
      showTyping();
      setTimeout(function() {
        hideTyping();
        addMessage('Hello! I am Laurimate, your campus assistant at Laurea. How can I help you today?', 'ai');
      }, 800);
    }, 400);
  });
</script>
</body>
</html>
