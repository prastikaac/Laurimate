<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Laurimate - Pepper</title>
<style>
body { font-family: Arial, sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }
.wrap { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,.08); overflow: hidden; }
header { padding: 14px 16px; background: #111827; color: #fff; font-weight: 700; text-align:center; }
#chat { height: 55vh; overflow: auto; padding: 16px; border-bottom: 1px solid #eee; }
.row { display: flex; margin: 10px 0; }
.bot { justify-content: flex-start; }
.bubble { max-width: 75%; padding: 10px 12px; border-radius: 14px; line-height: 1.35; word-break: break-word; background: #e5e7eb; color: #111827; border-bottom-left-radius: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <header>Laurimate - Pepper Campus Assistant</header>
  <div id="chat"></div>
</div>

<script>
function updateBubble(text) {
    var chat = document.getElementById("chat");
    var row = document.createElement("div");
    row.className = "row bot";
    var bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = text;
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
